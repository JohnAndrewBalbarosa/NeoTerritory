name: Routes manifest — dynamic-route smoke

# Reads tests/routes.manifest.json (the single source of truth for
# public route coverage) and runs Playwright against every row. The
# manifest is updated alongside any route, auth-tier, or testid change
# (see CLAUDE.md > 'CI/CD Routes Manifest'); this job is what catches
# missed updates.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: routes-manifest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  routes-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"
      NODE_NO_WARNINGS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Print routes manifest into job summary
        run: |
          node tests/scripts/print-routes.mjs >> "$GITHUB_STEP_SUMMARY"

      # B2.3 / D89: the public frontend is now the Next app on Vercel. CI builds and
      # serves it with `next start` and runs the manifest spec against it. Public/marketing
      # routes server-render standalone; /api proxies to AWS via next.config (not needed
      # for the public route+testid smoke). No C++/backend build required here.
      - name: Install Frontend dependencies (shared src + Playwright)
        working-directory: Codebase/Frontend
        run: npm ci --no-audit --no-fund

      - name: Install FrontendNext dependencies
        working-directory: Codebase/FrontendNext
        run: npm install --no-audit --no-fund

      - name: Install Playwright (Chromium only, with deps)
        working-directory: Codebase/Frontend
        run: npx playwright install --with-deps chromium

      - name: Build the Next app
        working-directory: Codebase/FrontendNext
        run: npx next build

      - name: Start the Next app
        working-directory: Codebase/FrontendNext
        env:
          AWS_BACKEND_ORIGIN: "http://122.248.192.49"
        run: |
          set -euo pipefail
          npx next start -p 3000 &
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null "http://127.0.0.1:3000/"; then
              echo "Next app up after ${i} attempt(s)."
              break
            fi
            sleep 2
          done
          curl -fsS -o /dev/null "http://127.0.0.1:3000/"

      - name: Run manifest-driven Playwright spec
        working-directory: Codebase/Frontend
        run: |
          npx playwright test playwright/tests/manifest-driven.spec.ts --reporter=list,html

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: routes-manifest-playwright-report
          path: Codebase/Frontend/playwright-report
          retention-days: 7
