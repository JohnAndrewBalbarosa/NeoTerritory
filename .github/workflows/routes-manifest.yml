name: Routes manifest — dynamic-route smoke

# Reads tests/routes.manifest.json (the single source of truth for
# public route coverage) and runs Playwright against every row. The
# manifest is updated alongside any route, auth-tier, or testid change
# (see CLAUDE.md > 'CI/CD Routes Manifest'); this job is what catches
# missed updates.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: routes-manifest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  routes-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3001"
      NODE_NO_WARNINGS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Print routes manifest into job summary
        run: |
          node tests/scripts/print-routes.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Install system build prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Install Frontend dependencies
        working-directory: Codebase/Frontend
        run: npm ci --no-audit --no-fund

      - name: Install Backend dependencies
        working-directory: Codebase/Backend
        run: npm ci --no-audit --no-fund

      - name: Install Playwright (Chromium only, with deps)
        working-directory: Codebase/Frontend
        run: npx playwright install --with-deps chromium

      - name: Build the C++ microservice
        run: |
          cmake -S Codebase/Microservice -B Codebase/Microservice/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build Codebase/Microservice/build --target NeoTerritory --parallel

      - name: Build Frontend (production)
        working-directory: Codebase/Frontend
        run: |
          npx tsc --noEmit
          npx vite build

      - name: Build Backend (TypeScript)
        working-directory: Codebase/Backend
        run: npm run build || echo "Backend has no build step or it failed; continuing if dist/ exists"

      - name: Start the studio stack
        working-directory: Codebase/Backend
        env:
          PORT: "3001"
          HOST: "127.0.0.1"
          NODE_ENV: "production"
          DEV_TEST_MODE: "true"
          ANTHROPIC_API_KEY: ""
          NEOTERRITORY_BIN: "${{ github.workspace }}/Codebase/Microservice/build/NeoTerritory"
          NEOTERRITORY_CATALOG: "${{ github.workspace }}/Codebase/Microservice/pattern_catalog"
          SEED_TEST_USERS: "1"
          MAX_TEST_USERS: "20"
          ENABLE_TEST_RUNNER: "0"
        run: |
          set -euo pipefail
          if [ -f dist/server.js ]; then
            node dist/server.js &
          else
            npx tsx src/server.ts &
          fi
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:3001/api/health" > /dev/null; then
              echo "Studio is up after ${i} attempt(s)."
              break
            fi
            sleep 2
          done
          curl -fsS "http://127.0.0.1:3001/api/health"

      - name: Run manifest-driven Playwright spec
        working-directory: Codebase/Frontend
        run: |
          npx playwright test playwright/tests/manifest-driven.spec.ts --reporter=list,html

      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: routes-manifest-playwright-report
          path: Codebase/Frontend/playwright-report
          retention-days: 7
