name: Adopt UI from Miryl + Jo into main

# Three-way UI adoption rule (per project owner):
#   1. For every file under Codebase/Frontend/* that differs between
#      origin/<miryl_branch> and main OR between origin/<jo_branch> and main:
#        - If Miryl's and Jo's versions are byte-identical -> adopt that version.
#        - If they differ                                  -> adopt Miryl's, and
#          record the file in the commit message under DIFFERENCES so the team
#          can see exactly which files Jo's UI work was *not* taken for.
#        - If only one branch changed it                   -> adopt that one.
#   2. Apply branding normalisation (CodiNeo -> NeoTerritory).
#   3. Run frontend typecheck + build before committing — this is the guard that
#      protects annotated-source tagging logic in Codebase/Frontend/src from
#      being silently broken by a UI adoption.
#   4. Scope is hard-locked to Codebase/Frontend/. Anything outside that path is
#      ignored by this workflow.

on:
  workflow_dispatch:
    inputs:
      miryl_branch:
        description: "Miryl's branch (no origin/ prefix)"
        default: "Branch-ni-miryl-ui"
        required: false
      jo_branch:
        description: "Jo's branch (no origin/ prefix)"
        default: "new-branch-jo"
        required: false

permissions:
  contents: write

jobs:
  merge-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Miryl + Jo branches
        run: |
          set -euo pipefail
          git fetch origin "${{ github.event.inputs.miryl_branch }}"
          git fetch origin "${{ github.event.inputs.jo_branch }}"

      # ------------------------------------------------------------------
      # Three-way adoption with branding normalisation. All work is scoped
      # to Codebase/Frontend/. The script writes /tmp/adoption-report.md
      # which is later folded into the commit message body.
      # ------------------------------------------------------------------
      - name: Adopt UI files (Miryl-priority, document differences)
        id: adopt
        shell: bash
        run: |
          set -euo pipefail

          MIRYL="origin/${{ github.event.inputs.miryl_branch }}"
          JO="origin/${{ github.event.inputs.jo_branch }}"
          UI_PATH="Codebase/Frontend"
          REPORT="/tmp/adoption-report.md"
          : > "$REPORT"

          # Normalise CodiNeo -> NeoTerritory branding inline. The longer
          # substitutions must come before the catch-all so we never end up
          # with "NeoTerritory Analysis".
          normalise() {
            sed \
              -e 's/CodiNeo Analysis/NeoTerritory Studio/g' \
              -e 's/CodiNeo/NeoTerritory/g' \
              -e 's/CodineoBrandMark/NTBrandMark/g' \
              -e 's/codineo-brand-header/nt-brand-header/g' \
              -e 's/codineo-brand-mark/nt-brand-mark/g' \
              -e 's/codineo-brand-name/nt-brand-name/g' \
              -e 's/codineo-brand-sub/nt-brand-sub/g' \
              -e 's|/\* CodiNeo brand mark|/* NeoTerritory brand mark|g'
          }

          # Union of files that differ in either branch vs main, restricted
          # to the UI path.
          mapfile -t MIRYL_FILES < <(git diff --name-only main "$MIRYL"  -- "$UI_PATH")
          mapfile -t JO_FILES    < <(git diff --name-only main "$JO"     -- "$UI_PATH")
          ALL_FILES=$(printf '%s\n' "${MIRYL_FILES[@]}" "${JO_FILES[@]}" | sort -u | sed '/^$/d')

          {
            echo "## UI adoption report"
            echo ""
            echo "- Miryl branch: \`${{ github.event.inputs.miryl_branch }}\`"
            echo "- Jo branch:    \`${{ github.event.inputs.jo_branch }}\`"
            echo ""
          } >> "$REPORT"

          IDENTICAL=()
          MIRYL_ONLY=()
          JO_ONLY=()
          DIFFER=()

          for f in $ALL_FILES; do
            in_miryl=0; in_jo=0
            for x in "${MIRYL_FILES[@]}"; do [[ "$x" == "$f" ]] && in_miryl=1; done
            for x in "${JO_FILES[@]}";    do [[ "$x" == "$f" ]] && in_jo=1;    done

            if [[ "$in_miryl" -eq 1 && "$in_jo" -eq 1 ]]; then
              # Compare Miryl's and Jo's versions head-to-head (post-normalisation,
              # so harmless branding-only divergence does not flag as DIFFER).
              MIRYL_NORM=$(git show "$MIRYL:$f" | normalise || true)
              JO_NORM=$(git show "$JO:$f"       | normalise || true)
              if [[ "$MIRYL_NORM" == "$JO_NORM" ]]; then
                printf '%s' "$MIRYL_NORM" > "$f"
                IDENTICAL+=("$f")
              else
                printf '%s' "$MIRYL_NORM" > "$f"
                DIFFER+=("$f")
              fi
            elif [[ "$in_miryl" -eq 1 ]]; then
              git show "$MIRYL:$f" | normalise > "$f"
              MIRYL_ONLY+=("$f")
            else
              git show "$JO:$f" | normalise > "$f"
              JO_ONLY+=("$f")
            fi
          done

          {
            echo "### Identical in Miryl + Jo (adopted directly): ${#IDENTICAL[@]}"
            for f in "${IDENTICAL[@]}"; do echo "- $f"; done
            echo ""
            echo "### Differ between Miryl and Jo — Miryl version adopted: ${#DIFFER[@]}"
            for f in "${DIFFER[@]}"; do
              echo "- $f"
              # Inline a tight stat of what Jo would have changed vs Miryl,
              # so reviewers can see whether anything important was discarded.
              STAT=$(git diff --stat "$MIRYL:$f" "$JO:$f" 2>/dev/null | head -1 || true)
              [[ -n "$STAT" ]] && echo "  - Jo-vs-Miryl stat: $STAT"
            done
            echo ""
            echo "### Only in Miryl: ${#MIRYL_ONLY[@]}"
            for f in "${MIRYL_ONLY[@]}"; do echo "- $f"; done
            echo ""
            echo "### Only in Jo: ${#JO_ONLY[@]}"
            for f in "${JO_ONLY[@]}"; do echo "- $f"; done
          } >> "$REPORT"

          echo "::group::Adoption report"
          cat "$REPORT"
          echo "::endgroup::"

      # ------------------------------------------------------------------
      # Scope guard: nothing outside Codebase/Frontend/ may have been touched.
      # ------------------------------------------------------------------
      - name: Verify scope is UI-only
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t CHANGED < <(git diff --name-only HEAD)
          DISALLOWED=()
          for f in "${CHANGED[@]}"; do
            [[ -z "$f" ]] && continue
            if [[ "$f" != Codebase/Frontend/* ]]; then
              DISALLOWED+=("$f")
            fi
          done
          if [[ ${#DISALLOWED[@]} -gt 0 ]]; then
            echo "Adoption produced changes outside Codebase/Frontend/:" >&2
            printf ' - %s\n' "${DISALLOWED[@]}" >&2
            exit 1
          fi
          echo "Scope OK — only Codebase/Frontend/ touched."

      # ------------------------------------------------------------------
      # No CodiNeo references must remain — branding normalisation gate.
      # ------------------------------------------------------------------
      - name: Verify no CodiNeo references remain
        shell: bash
        run: |
          set -euo pipefail
          if git diff --name-only HEAD -- Codebase/Frontend \
              | xargs -r grep -liE "CodiNeo|codineo" 2>/dev/null; then
            echo "ERROR: CodiNeo branding still present in adopted files." >&2
            exit 1
          fi
          echo "✓ No CodiNeo references in adopted files."

      # ------------------------------------------------------------------
      # Logic guard: typecheck + build must pass on the adopted tree. This
      # is the protection for annotated-source tagging behaviour: if Jo or
      # Miryl unintentionally broke the contract, the build catches it
      # before we push to main.
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Codebase/Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix Codebase/Frontend ci --include=dev

      - name: Frontend typecheck (logic guard)
        run: npm --prefix Codebase/Frontend run typecheck

      - name: Frontend build (logic guard)
        run: npm --prefix Codebase/Frontend run build

      - name: Show diff summary
        shell: bash
        run: git diff --stat HEAD

      # ------------------------------------------------------------------
      # Commit with the adoption report as the body so the differences are
      # documented in git history (per project owner's instruction).
      # ------------------------------------------------------------------
      - name: Commit and push to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the UI scope.
          git add -- Codebase/Frontend

          if git diff --cached --quiet; then
            echo "Nothing to commit — main UI is already aligned with Miryl/Jo."
            exit 0
          fi

          MIRYL_BR="${{ github.event.inputs.miryl_branch }}"
          JO_BR="${{ github.event.inputs.jo_branch }}"

          {
            echo "feat(ui): adopt UI from $MIRYL_BR + $JO_BR (Miryl-priority on conflicts)"
            echo ""
            cat /tmp/adoption-report.md
          } > /tmp/commit-msg.txt

          git commit -F /tmp/commit-msg.txt
          git push origin main
