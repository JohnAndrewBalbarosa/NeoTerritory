name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ui-scope-guard:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide if guard should enforce for this actor
        id: guard_scope
        shell: bash
        run: |
          set -euo pipefail
          ACTOR="${{ github.actor }}"
          EXEMPT_ACTORS=("JohnAndrewBalbarosa")

          for exempt in "${EXEMPT_ACTORS[@]}"; do
            if [[ "$ACTOR" == "$exempt" ]]; then
              echo "enforce=false" >> "$GITHUB_OUTPUT"
              echo "Guard skipped for exempt actor: $ACTOR"
              exit 0
            fi
          done

          echo "enforce=true" >> "$GITHUB_OUTPUT"
          echo "Guard enforced for actor: $ACTOR"

      - name: Validate changed files are UI-only
        if: steps.guard_scope.outputs.enforce == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          else
            echo "No scope validation required for event: ${GITHUB_EVENT_NAME}"
            exit 0
          fi

          if [[ -z "${BASE_SHA}" || -z "${HEAD_SHA}" ]]; then
            echo "Base/head SHA missing from event payload; skipping scope validation."
            exit 0
          fi

          mapfile -t CHANGED_FILES < <(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")

          if [[ ${#CHANGED_FILES[@]} -eq 0 ]]; then
            echo "No changed files detected."
            exit 0
          fi

          DISALLOWED=()
          for f in "${CHANGED_FILES[@]}"; do
            if [[ "$f" != Codebase/Frontend/* ]]; then
              DISALLOWED+=("$f")
            fi
          done

          if [[ ${#DISALLOWED[@]} -gt 0 ]]; then
            echo "UI-only policy violation. These files are outside Codebase/Frontend/:"
            printf ' - %s\n' "${DISALLOWED[@]}"
            exit 1
          fi

          echo "All changed files are within Codebase/Frontend/."

  backend-microservice-build-and-test:
    runs-on: ubuntu-latest
    env:
      DEV_TEST_MODE: "true"
      NODE_ENV: "test"
      POD_WARMUP_ON_CLAIM: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            Codebase/Backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix Codebase/Backend ci --include=dev

      - name: Backend typecheck
        run: npm --prefix Codebase/Backend run typecheck

      - name: Backend build
        run: npm --prefix Codebase/Backend run build

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build microservice
        run: cmake --build build --config Release

      - name: Generate microservice output artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/microservice-output
          ./build/NeoTerritory --output artifacts/microservice-output Codebase/Microservice/samples
          test -f artifacts/microservice-output/report.json

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: Codebase/Backend/dist

      - name: Upload microservice output artifact
        uses: actions/upload-artifact@v4
        with:
          name: microservice-output
          path: artifacts/microservice-output

  front-end-build-and-test:
    needs:
      - backend-microservice-build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            Codebase/Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix Codebase/Frontend ci --include=dev

      - name: Frontend typecheck
        run: npm --prefix Codebase/Frontend run typecheck

      - name: Frontend build
        run: npm --prefix Codebase/Frontend run build

  playwright-annotated-source-testing:
    needs:
      - backend-microservice-build-and-test
      - front-end-build-and-test
    runs-on: ubuntu-latest
    env:
      DEV_TEST_MODE: "true"
      NODE_ENV: "test"
      JWT_SECRET: "ci-static-jwt-secret"
      SEED_TEST_USERS: "1"
      CI_BACKEND_URL: "http://127.0.0.1:3001"
      POD_WARMUP_ON_CLAIM: "0"
      TEST_RUNNER_USE_DOCKER: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            Codebase/Backend/package-lock.json
            Codebase/Frontend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix Codebase/Backend ci --include=dev

      - name: Install frontend dependencies
        run: npm --prefix Codebase/Frontend ci --include=dev

      - name: Download backend build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: Codebase/Backend/dist

      - name: Install Playwright Chromium
        run: npm --prefix Codebase/Frontend exec playwright install --with-deps chromium

      - name: Playwright smoke check (backend + website routes)
        run: node scripts/ci-smoke.mjs
        working-directory: Codebase/Frontend

      - name: Annotated source API check
        shell: bash
        run: |
          set -euo pipefail
          node -e "const {spawn}=require('node:child_process');(async()=>{const base='http://127.0.0.1:3001';const p=spawn('node',['../Backend/dist/server.js'],{cwd:'Codebase/Frontend',stdio:'inherit',env:{...process.env,PORT:'3001',HOST:'127.0.0.1',NODE_ENV:'test'}});const stop=()=>{if(!p.killed)p.kill('SIGTERM');};process.on('exit',stop);for(let i=0;i<90;i++){try{const r=await fetch(base+'/health');if(r.ok)break;}catch{}await new Promise(r=>setTimeout(r,1000));if(i===89)throw new Error('backend not ready');}const acc=await fetch(base+'/auth/test-accounts').then(r=>r.json());if(!acc.accounts?.length)throw new Error('no tester accounts');const tokenRes=await fetch(base+'/auth/claim',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({username:acc.accounts[0].username})});if(!tokenRes.ok)throw new Error('claim failed');const token=(await tokenRes.json()).token;const sample=await fetch(base+'/api/sample').then(r=>r.json());if(!sample.code)throw new Error('sample missing code');const analyze=await fetch(base+'/api/analyze',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+token},body:JSON.stringify({filename:sample.filename||'sample.cpp',code:sample.code})});if(!analyze.ok)throw new Error('analyze failed');const payload=await analyze.json();if(!payload.pendingId)throw new Error('pendingId missing');if(!Array.isArray(payload.annotations))throw new Error('annotations missing');console.log('Annotated source API check passed.');stop();})().catch(e=>{console.error(e);process.exit(1);});"

  pod-build-and-test:
    needs:
      - playwright-annotated-source-testing
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      POD_WARMUP_ON_CLAIM: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Build runtime image for pod test
        run: docker build -t neoterritory:ci -f Codebase/Infrastructure/session-orchestration/docker/Dockerfile .

      - name: Load image into kind
        run: kind load docker-image neoterritory:ci

      - name: Render pod templates
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/k8s-rendered
          sed -e 's/{{user_id}}/ci/g' -e 's|{{image}}|neoterritory:ci|g' \
            Codebase/Infrastructure/session-orchestration/k8s/templates/user-session-pod.yaml > /tmp/k8s-rendered/pod.yaml
          sed -e 's/{{user_id}}/ci/g' \
            Codebase/Infrastructure/session-orchestration/k8s/templates/user-routing.yaml > /tmp/k8s-rendered/service.yaml

      - name: Apply pod manifests
        run: |
          kubectl apply -f /tmp/k8s-rendered/pod.yaml
          kubectl apply -f /tmp/k8s-rendered/service.yaml

      - name: Wait for pod ready
        run: kubectl wait --for=condition=Ready pod/neoterritory-session-ci --timeout=240s

      - name: Pod health checks
        run: |
          kubectl port-forward pod/neoterritory-session-ci 3001:3001 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap "kill ${PF_PID}" EXIT
          sleep 8
          curl -fsS http://127.0.0.1:3001/health
          curl -fsS http://127.0.0.1:3001/api/health

      - name: Collect pod logs
        if: always()
        run: kubectl logs pod/neoterritory-session-ci --tail=200 || true

  gdb-runner-and-unit-tests:
    needs:
      - pod-build-and-test
      - backend-microservice-build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      DEV_TEST_MODE: "true"
      NODE_ENV: "test"
      JWT_SECRET: "ci-static-jwt-secret"
      SEED_TEST_USERS: "1"
      ENABLE_TEST_RUNNER: "1"
      TEST_RUNNER_USE_DOCKER: "1"
      POD_IMAGE: "neoterritory/cpp-pod:latest"
      POD_WARMUP_ON_CLAIM: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            Codebase/Backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix Codebase/Backend ci --include=dev

      - name: Download backend build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: Codebase/Backend/dist

      - name: Run GDB runner and unit-test API flow
        shell: bash
        run: |
          set -euo pipefail
          node -e "const {spawn}=require('node:child_process');(async()=>{const base='http://127.0.0.1:3001';const p=spawn('node',['Codebase/Backend/dist/server.js'],{stdio:'inherit',env:{...process.env,PORT:'3001',HOST:'127.0.0.1'}});const stop=()=>{if(!p.killed)p.kill('SIGTERM');};process.on('exit',stop);for(let i=0;i<90;i++){try{const r=await fetch(base+'/health');if(r.ok)break;}catch{}await new Promise(r=>setTimeout(r,1000));if(i===89)throw new Error('backend not ready');}const acc=await fetch(base+'/auth/test-accounts').then(r=>r.json());if(!acc.accounts?.length)throw new Error('no tester accounts');const claim=await fetch(base+'/auth/claim',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({username:acc.accounts[0].username})});if(!claim.ok)throw new Error('claim failed');const token=(await claim.json()).token;const sample=await fetch(base+'/api/sample').then(r=>r.json());const analyze=await fetch(base+'/api/analyze',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+token},body:JSON.stringify({filename:sample.filename||'sample.cpp',code:sample.code})});if(!analyze.ok)throw new Error('analyze failed');const payload=await analyze.json();const runTests=await fetch(base+'/api/analysis/run-tests',{method:'POST',headers:{'content-type':'application/json','authorization':'Bearer '+token},body:JSON.stringify({pendingId:payload.pendingId,classResolvedPatterns:payload.classResolvedPatterns||{},stdin:''})});if(!runTests.ok){const t=await runTests.text();throw new Error('run-tests failed: '+runTests.status+' '+t);}const result=await runTests.json();if(!Array.isArray(result.results))throw new Error('run-tests missing results');console.log('GDB runner API flow passed. result count=',result.results.length);stop();})().catch(e=>{console.error(e);process.exit(1);});"

  check-output:
    needs:
      - gdb-runner-and-unit-tests
      - backend-microservice-build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download microservice output artifact
        uses: actions/download-artifact@v4
        with:
          name: microservice-output
          path: artifacts/microservice-output

      - name: Validate output artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/microservice-output/report.json
          test -s artifacts/microservice-output/report.json
          node -e "const fs=require('fs');const p='artifacts/microservice-output/report.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));if(!j||typeof j!=='object')throw new Error('invalid report');console.log('output report valid');"

  production-no-leak-check:
    runs-on: ubuntu-latest
    env:
      DEV_TEST_MODE: "false"
      NODE_ENV: "production"
      POD_WARMUP_ON_CLAIM: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            Codebase/Backend/package-lock.json
            Codebase/Frontend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix Codebase/Backend ci --include=dev

      - name: Install frontend dependencies
        run: npm --prefix Codebase/Frontend ci --include=dev

      - name: Build backend in production mode
        run: npm --prefix Codebase/Backend run build

      - name: Build frontend in production mode
        run: npm --prefix Codebase/Frontend run build

      - name: Assert DEV_TEST_MODE disabled in this job
        run: |
          test "$DEV_TEST_MODE" = "false"
          test "$NODE_ENV" = "production"

  deploy-aws:
    needs:
      - check-output
      - production-no-leak-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SECRET_AWS_SSH_PRIVATE_KEY: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
      SECRET_AWS_SSH_KEY_PEM: ${{ secrets.AWS_SSH_KEY_PEM }}
      SECRET_AWS_DEPLOY_ENV: ${{ secrets.AWS_DEPLOY_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SECRET_AWS_DEPLOY_ENV:-}" ]]; then
            echo "Missing AWS_DEPLOY_ENV secret." >&2
            exit 1
          fi
          if [[ -z "${SECRET_AWS_SSH_PRIVATE_KEY:-}" && -z "${SECRET_AWS_SSH_KEY_PEM:-}" ]]; then
            echo "Missing SSH private key secret. Set AWS_SSH_PRIVATE_KEY or AWS_SSH_KEY_PEM." >&2
            exit 1
          fi

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          KEY_CONTENT="${SECRET_AWS_SSH_PRIVATE_KEY:-}"
          if [[ -z "$KEY_CONTENT" ]]; then
            KEY_CONTENT="${SECRET_AWS_SSH_KEY_PEM:-}"
          fi
          if [[ -z "$KEY_CONTENT" ]]; then
            echo "Missing SSH private key secret. Set AWS_SSH_PRIVATE_KEY or AWS_SSH_KEY_PEM." >&2
            exit 1
          fi
          printf '%s\n' "$KEY_CONTENT" > "$HOME/.ssh/neoterritory.pem"
          chmod 600 "$HOME/.ssh/neoterritory.pem"

      - name: Prepare deploy environment file
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "$SECRET_AWS_DEPLOY_ENV" > scripts/.env.deploy
          {
            echo ""
            echo "AWS_SSH_KEY=$HOME/.ssh/neoterritory.pem"
          } >> scripts/.env.deploy

      - name: Deploy to AWS (source mode)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/deploy-aws.sh
          ./scripts/deploy-aws.sh --source --yes
