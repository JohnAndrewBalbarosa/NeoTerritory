<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CodiNeo – Results</title>
</head>

<body>
    <div class="page">

        <!-- Back link -->
        <a class="back-link" href="#/dashboard" onclick="event.preventDefault(); location.hash='#/dashboard'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Back to Dashboard
        </a>

        <!-- Project header -->
        <div class="results-project-header">
            <h1 class="results-project-name">MyProject-v2</h1>
            <span class="pill pill-non-conformant">Non-conformant</span>
        </div>

        <p class="results-timestamp">Analysis completed on 2026-02-23 at 14:30</p>

        <!-- Action buttons -->
        <div class="results-actions" style="margin-bottom: 28px;">
            <button class="btn btn-outline" onclick="location.hash='#/diff/1'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="width:15px;height:15px;">
                    <polyline points="16 3 21 3 21 8" />
                    <line x1="4" y1="20" x2="21" y2="3" />
                    <polyline points="21 16 21 21 16 21" />
                </svg>
                View Diff
            </button>
            <button class="btn btn-primary" onclick="location.hash='#/fixes/1'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" style="width:15px;height:15px;">
                    <path
                        d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
                </svg>
                Fix Suggestions
            </button>
        </div>

        <!-- Metric Cards -->
        <div class="stat-cards">

            <!-- Structural violations -->
            <div class="card card-yellow-border">
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                    <line x1="12" y1="9" x2="12" y2="13" />
                    <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
                <div class="card-label">Structural violations</div>
                <div class="card-value" style="color:var(--accent-yellow)">8</div>
                <p style="font-size:12px; color:var(--text-muted); margin-top:8px;">Raw pointer usage, missing RAII
                    patterns</p>
            </div>

            <!-- Semantic alignment -->
            <div class="card card-purple-border">
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                    <polyline points="17 6 23 6 23 12" />
                </svg>
                <div class="card-label">Semantic alignment</div>
                <div class="card-value" style="color:var(--accent-purple)">87%</div>
                <div class="progress-bar" style="margin-top:12px;">
                    <div class="progress-fill progress-fill-purple" style="width:87%"></div>
                </div>
            </div>

            <!-- Memory efficiency -->
            <div class="card card-green-border">
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#C0FF00" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                <div class="card-label">Memory efficiency</div>
                <div class="card-value" style="color:var(--accent-green)">92%</div>
                <div class="progress-bar" style="margin-top:12px;">
                    <div class="progress-fill" style="width:92%"></div>
                </div>
            </div>

        </div>

    </div>
</body>

</html>
