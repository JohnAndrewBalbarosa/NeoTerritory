<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CodiNeo – Diff Viewer</title>
</head>

<body>
    <div class="page">

        <!-- Back link -->
        <a class="back-link" href="#/results" onclick="event.preventDefault(); location.hash='#/results'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Back to Results
        </a>

        <!-- Header row -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Diff Viewer</h1>
                <p class="page-subtitle">Structure-aware comparison &bull; <code
                        style="font-family:var(--font-mono); font-size:12px; color:var(--text-muted);">src/core/engine.cpp</code>
                </p>
            </div>
            <!-- Icon buttons -->
            <div class="diff-icons">
                <button class="diff-icon-btn active" id="icon-code" title="Code view" onclick="setDiffIcon('code')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="width:16px;height:16px;">
                        <polyline points="16 18 22 12 16 6" />
                        <polyline points="8 6 2 12 8 18" />
                    </svg>
                </button>
                <button class="diff-icon-btn" id="icon-graph" title="Graph view" onclick="setDiffIcon('graph')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="width:16px;height:16px;">
                        <circle cx="18" cy="5" r="3" />
                        <circle cx="6" cy="12" r="3" />
                        <circle cx="18" cy="19" r="3" />
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Tab bar -->
        <div
            style="display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:12px;">
            <div class="diff-tab-bar">
                <button class="diff-tab active" id="tab-text" onclick="switchTab('text')">Text Diff</button>
                <button class="diff-tab" id="tab-ast" onclick="switchTab('ast')">AST / Graph View</button>
            </div>
            <div style="font-size:12px; color:var(--text-muted);">
                <span style="color:var(--accent-red); font-weight:600;">−9 deletions</span> &nbsp;/&nbsp; <span
                    style="color:var(--accent-green); font-weight:600;">+10 additions</span>
            </div>
        </div>

        <!-- TEXT DIFF VIEW -->
        <div id="text-diff-view">
            <div class="diff-columns">

                <!-- Original -->
                <div class="diff-column">
                    <div class="diff-column-header">
                        <span class="diff-column-title">Original Code</span>
                        <span class="diff-column-tag diff-tag-red">Raw pointers</span>
                    </div>
                    <div class="diff-code" id="original-code"></div>
                </div>

                <!-- Transformed -->
                <div class="diff-column">
                    <div class="diff-column-header">
                        <span class="diff-column-title">Transformed Code</span>
                        <span class="diff-column-tag diff-tag-green">RAII smart</span>
                    </div>
                    <div class="diff-code" id="transformed-code"></div>
                </div>

            </div>
        </div>

        <!-- AST VIEW -->
        <div class="ast-view" id="ast-view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="5" r="3" />
                <circle cx="5" cy="19" r="3" />
                <circle cx="19" cy="19" r="3" />
                <line x1="12" y1="8" x2="5" y2="16" />
                <line x1="12" y1="8" x2="19" y2="16" />
            </svg>
            <p style="font-size:14px; font-weight:600;">AST / Graph View</p>
            <p style="font-size:13px; color:var(--text-muted);">Abstract syntax tree visualization will appear
                here.<br>Backend integration required.</p>
        </div>

        <!-- Footer actions -->
        <div class="diff-footer">
            <button class="btn btn-purple" onclick="location.hash='#/fixes/1'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="width:15px;height:15px;">
                    <path
                        d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
                </svg>
                View Fix Suggestions
            </button>
            <button class="btn btn-primary" onclick="location.hash='#/download/1'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round" style="width:15px;height:15px;">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Download Changes
            </button>
        </div>

    </div>

    <!-- Logic handled by external scripts/diff-viewer.js -->
</body>

</html>
